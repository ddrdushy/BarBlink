# Barblink — Production Nginx Configuration
#
# Reverse proxy for all microservices, web portals, and WebSocket support.
# Coolify handles SSL termination via Traefik/Let's Encrypt, so this
# config listens on port 80 behind the TLS layer.
#
# Usage:
#   docker compose --profile nginx up -d
#   (or deploy via Coolify as a standalone Nginx resource)

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

    # Upstream definitions for health-check and load-balancing readiness
    upstream auth_service       { server auth-service:3001; }
    upstream user_service       { server user-service:3002; }
    upstream venue_service      { server venue-service:3003; }
    upstream discovery_service  { server discovery-service:3004; }
    upstream social_service     { server social-service:3005; }
    upstream checkin_service    { server checkin-service:3006; }
    upstream chat_service       { server chat-service:3007; }
    upstream notification_service { server notification-service:3008; }
    upstream scraper_service    { server scraper-service:3009; }
    upstream dj_service         { server dj-service:3010; }
    upstream events_service     { server events-service:3011; }
    upstream community_service  { server community-service:3012; }

    # =========================================================================
    # API Gateway — api.barblink.com
    # =========================================================================
    server {
        listen 80;
        server_name api.barblink.com;

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Common proxy settings (inherited by all location blocks)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Max body size for uploads (photos, stories)
        client_max_body_size 25m;

        # --- Health check ------------------------------------------------
        location /health {
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        # =================================================================
        # AUTH SERVICE — auth-service:3001
        # =================================================================

        # User auth
        location /v1/auth/register     { limit_req zone=auth burst=3; proxy_pass http://auth_service; }
        location /v1/auth/login        { limit_req zone=auth burst=3; proxy_pass http://auth_service; }
        location /v1/auth/send-otp     { limit_req zone=auth burst=3; proxy_pass http://auth_service; }
        location /v1/auth/verify-otp   { limit_req zone=auth burst=3; proxy_pass http://auth_service; }
        location /v1/auth/refresh      { proxy_pass http://auth_service; }
        location /v1/auth/logout       { proxy_pass http://auth_service; }
        location /v1/auth/google       { proxy_pass http://auth_service; }
        location /v1/auth/apple        { proxy_pass http://auth_service; }

        # Vendor auth
        location /v1/auth/vendor/ {
            limit_req zone=auth burst=5;
            proxy_pass http://auth_service;
        }

        # DJ auth
        location /v1/auth/dj/ {
            limit_req zone=auth burst=5;
            proxy_pass http://auth_service;
        }

        # Admin auth
        location /v1/auth/admin/ {
            limit_req zone=auth burst=3;
            proxy_pass http://auth_service;
        }

        # =================================================================
        # ADMIN ENDPOINTS — auth-service:3001
        # =================================================================

        location /v1/admin/vendor-applications/ {
            proxy_pass http://auth_service;
        }

        location /v1/admin/dj-applications/ {
            proxy_pass http://auth_service;
        }

        location /v1/admin/settings/ {
            proxy_pass http://auth_service;
        }

        # Catch-all admin (must be after more specific /v1/admin/* routes)
        location /v1/admin/ {
            proxy_pass http://auth_service;
        }

        # =================================================================
        # USER SERVICE — user-service:3002
        # =================================================================

        location /v1/users/ {
            limit_req zone=api burst=10;
            proxy_pass http://user_service;
        }

        # =================================================================
        # VENUE SERVICE — venue-service:3003
        # =================================================================

        location /v1/venues/ {
            limit_req zone=api burst=10;
            proxy_pass http://venue_service;
        }

        location /v1/vendor/ {
            proxy_pass http://venue_service;
        }

        # =================================================================
        # DISCOVERY SERVICE — discovery-service:3004
        # =================================================================

        location /v1/discovery/ {
            limit_req zone=api burst=10;
            proxy_pass http://discovery_service;
        }

        # =================================================================
        # SOCIAL SERVICE — social-service:3005
        # =================================================================

        location /v1/feed {
            limit_req zone=api burst=10;
            proxy_pass http://social_service;
        }

        location /v1/posts/ {
            limit_req zone=api burst=10;
            proxy_pass http://social_service;
        }

        location /v1/stories/ {
            proxy_pass http://social_service;
        }

        location /v1/reports {
            proxy_pass http://social_service;
        }

        location /v1/upload {
            client_max_body_size 50m;
            proxy_pass http://social_service;
        }

        # =================================================================
        # CHECK-IN SERVICE — checkin-service:3006
        # =================================================================

        location /v1/checkins/ {
            limit_req zone=api burst=10;
            proxy_pass http://checkin_service;
        }

        # =================================================================
        # CHAT SERVICE — chat-service:3007 (with WebSocket)
        # =================================================================

        location /v1/chat/ {
            proxy_pass http://chat_service;
        }

        location /socket.io/ {
            proxy_pass http://chat_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # =================================================================
        # NOTIFICATION SERVICE — notification-service:3008
        # =================================================================

        location /v1/notifications/ {
            proxy_pass http://notification_service;
        }

        # =================================================================
        # SCRAPER SERVICE — scraper-service:3009 (admin only)
        # =================================================================

        location /v1/admin/scraper/ {
            proxy_pass http://scraper_service;
        }

        # =================================================================
        # DJ SERVICE — dj-service:3010
        # =================================================================

        location /v1/dj/ {
            limit_req zone=api burst=10;
            proxy_pass http://dj_service;
        }

        # =================================================================
        # EVENTS SERVICE — events-service:3011
        # =================================================================

        location /v1/events/ {
            limit_req zone=api burst=10;
            proxy_pass http://events_service;
        }

        # =================================================================
        # COMMUNITY SERVICE — community-service:3012
        # =================================================================

        location /v1/community/ {
            proxy_pass http://community_service;
        }
    }

    # =========================================================================
    # Landing page — barblink.com / www.barblink.com
    # =========================================================================
    server {
        listen 80;
        server_name barblink.com www.barblink.com;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        location / {
            proxy_pass http://landing:3100;
        }
    }

    # =========================================================================
    # Admin panel — admin.barblink.com
    # =========================================================================
    server {
        listen 80;
        server_name admin.barblink.com;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        location / {
            proxy_pass http://admin:3200;
        }
    }

    # =========================================================================
    # Vendor portal — venue.barblink.com
    # =========================================================================
    server {
        listen 80;
        server_name venue.barblink.com;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        location / {
            proxy_pass http://vendor-portal:3020;
        }
    }

    # =========================================================================
    # DJ portal — dj.barblink.com
    # =========================================================================
    server {
        listen 80;
        server_name dj.barblink.com;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        location / {
            proxy_pass http://dj-portal:3021;
        }
    }
}
