# Barblink — unified dev stack.
#
# Brings up the Phase 0 infrastructure (per docs/08-build-order.md) plus a
# toolbox container with the Expo / EAS CLI preinstalled.
#
# Usage:
#   docker compose up -d              # start infra (postgres, redis, redpanda, minio, meilisearch)
#   ./bin/eas <command>               # run any eas/expo command inside the toolbox (no install on host)
#   docker compose --profile landing up -d   # also start the landing page
#   docker compose down               # stop everything (keeps volumes)
#   docker compose down -v            # stop + wipe volumes
#
# Note: the Expo dev server for apps/mobile is NOT in Docker on purpose — the
# iOS simulator and Android emulator can't reach a bundler inside a macOS
# Docker container reliably. Run `pnpm expo start` on the host for dev, and
# use the toolbox only for eas init / login / build / submit / update.

name: barblink

services:
  # ---------------------------------------------------------------------------
  # Postgres — one cluster, many service databases (see init-postgres.sql)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: barblink-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-barblink}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-barblink_dev}
      POSTGRES_DB: barblink
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/init-postgres.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-barblink} -d barblink"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis — cache, feed, Redis-backed crowd meter
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: barblink-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redpanda — Kafka-compatible event bus (lighter than full Kafka)
  # ---------------------------------------------------------------------------
  redpanda:
    image: redpandadata/redpanda:v24.2.7
    container_name: barblink-redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --kafka-addr=PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
      - --rpc-addr=0.0.0.0:33145
      - --advertise-rpc-addr=redpanda:33145
      - --smp=1
      - --memory=1G
      - --mode=dev-container
      - --default-log-level=warn
    ports:
      - "${REDPANDA_KAFKA_PORT:-9092}:9092"
      - "${REDPANDA_ADMIN_PORT:-9644}:9644"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true'"]
      interval: 15s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible media storage (photos, videos, stories)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: barblink-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-barblink}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-barblink_dev_minio}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Meilisearch — venue + DJ full-text search
  # ---------------------------------------------------------------------------
  meilisearch:
    image: getmeili/meilisearch:v1.11
    container_name: barblink-meilisearch
    restart: unless-stopped
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-barblink_dev_meili}
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "${MEILI_PORT:-7700}:7700"
    volumes:
      - meilisearch_data:/meili_data
    # Meilisearch distroless image has no shell / curl / wget — skip the
    # healthcheck entirely. The service exposes /health on 7700 which you can
    # curl from the host to verify.

  # ---------------------------------------------------------------------------
  # EAS / Expo toolbox — one-shot container with eas-cli preinstalled.
  # Use via ./bin/eas <command> from the host.
  # ---------------------------------------------------------------------------
  eas:
    build:
      context: ./infrastructure/docker
      dockerfile: Dockerfile.eas
    image: barblink/eas-toolbox:latest
    container_name: barblink-eas
    working_dir: /workspace/apps/mobile
    volumes:
      - .:/workspace
      - eas_home:/root/.expo
      - eas_npm_cache:/root/.npm
    environment:
      EXPO_NO_TELEMETRY: "1"
      CI: ""
    # Keep alive so interactive `docker exec` works; actual commands go through bin/eas
    entrypoint: ["sleep", "infinity"]
    profiles: ["tools"]

  # ---------------------------------------------------------------------------
  # Auth service — NestJS + Prisma. Enable with --profile services
  # ---------------------------------------------------------------------------
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: barblink-auth-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-barblink}:${POSTGRES_PASSWORD:-barblink_dev}@postgres:5432/barblink_auth
      JWT_SECRET: ${JWT_SECRET:-barblink_dev_jwt_secret}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-15m}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-30d}
      MAILGUN_API_KEY: ${MAILGUN_API_KEY:-}
      MAILGUN_DOMAIN: ${MAILGUN_DOMAIN:-mg.barblink.com}
      MAILGUN_FROM: ${MAILGUN_FROM:-Barblink <noreply@mg.barblink.com>}
      DEV_OTP_BYPASS: "true"
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@barblink.com}
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD:-admin123}
      ADMIN_NAME: ${ADMIN_NAME:-Platform Admin}
      PORT: "3001"
    ports:
      - "${AUTH_SERVICE_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["services"]

  # ---------------------------------------------------------------------------
  # User service — NestJS + Prisma. Enable with --profile services
  # ---------------------------------------------------------------------------
  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: barblink-user-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-barblink}:${POSTGRES_PASSWORD:-barblink_dev}@postgres:5432/barblink_user
      JWT_SECRET: ${JWT_SECRET:-barblink_dev_jwt_secret}
      PORT: "3002"
    ports:
      - "${USER_SERVICE_PORT:-3002}:3002"
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["services"]

  # ---------------------------------------------------------------------------
  # Venue service — NestJS + Prisma. Enable with --profile services
  # ---------------------------------------------------------------------------
  venue-service:
    build:
      context: ./services/venue-service
      dockerfile: Dockerfile
    container_name: barblink-venue-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-barblink}:${POSTGRES_PASSWORD:-barblink_dev}@postgres:5432/barblink_venue
      JWT_SECRET: ${JWT_SECRET:-barblink_dev_jwt_secret}
      PORT: "3003"
    ports:
      - "${VENUE_SERVICE_PORT:-3003}:3003"
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["services"]

  # ---------------------------------------------------------------------------
  # Check-in service — NestJS + Prisma. Enable with --profile services
  # ---------------------------------------------------------------------------
  checkin-service:
    build:
      context: ./services/checkin-service
      dockerfile: Dockerfile
    container_name: barblink-checkin-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-barblink}:${POSTGRES_PASSWORD:-barblink_dev}@postgres:5432/barblink_checkin
      JWT_SECRET: ${JWT_SECRET:-barblink_dev_jwt_secret}
      PORT: "3006"
    ports:
      - "${CHECKIN_SERVICE_PORT:-3006}:3006"
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["services"]

  # ---------------------------------------------------------------------------
  # Social service — NestJS + Prisma. Enable with --profile services
  # ---------------------------------------------------------------------------
  social-service:
    build:
      context: ./services/social-service
      dockerfile: Dockerfile
    container_name: barblink-social-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-barblink}:${POSTGRES_PASSWORD:-barblink_dev}@postgres:5432/barblink_social
      JWT_SECRET: ${JWT_SECRET:-barblink_dev_jwt_secret}
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-barblink}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-barblink_dev_minio}
      MINIO_BUCKET: barblink-media
      MINIO_PUBLIC_URL: http://localhost:9000
      PORT: "3005"
    ports:
      - "${SOCIAL_SERVICE_PORT:-3005}:3005"
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["services"]

  # ---------------------------------------------------------------------------
  # Discovery service — nearby, search, map. Enable with --profile services
  # ---------------------------------------------------------------------------
  discovery-service:
    build:
      context: ./services/discovery-service
      dockerfile: Dockerfile
    container_name: barblink-discovery-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-barblink}:${POSTGRES_PASSWORD:-barblink_dev}@postgres:5432/barblink_discovery
      VENUE_SERVICE_URL: http://venue-service:3003/v1
      CHECKIN_SERVICE_URL: http://checkin-service:3006/v1
      PORT: "3004"
    ports:
      - "${DISCOVERY_SERVICE_PORT:-3004}:3004"
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["services"]

  # ---------------------------------------------------------------------------
  # Chat service — DMs, group chats. Enable with --profile services
  # ---------------------------------------------------------------------------
  chat-service:
    build:
      context: ./services/chat-service
      dockerfile: Dockerfile
    container_name: barblink-chat-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-barblink}:${POSTGRES_PASSWORD:-barblink_dev}@postgres:5432/barblink_chat
      JWT_SECRET: ${JWT_SECRET:-barblink_dev_jwt_secret}
      PORT: "3007"
    ports:
      - "${CHAT_SERVICE_PORT:-3007}:3007"
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["services"]

  # ---------------------------------------------------------------------------
  # Notification service — push + in-app. Enable with --profile services
  # ---------------------------------------------------------------------------
  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: barblink-notification-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-barblink}:${POSTGRES_PASSWORD:-barblink_dev}@postgres:5432/barblink_notification
      JWT_SECRET: ${JWT_SECRET:-barblink_dev_jwt_secret}
      PORT: "3008"
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-3008}:3008"
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["services"]

  # ---------------------------------------------------------------------------
  # DJ service — profiles, genres. Enable with --profile services
  # ---------------------------------------------------------------------------
  dj-service:
    build:
      context: ./services/dj-service
      dockerfile: Dockerfile
    container_name: barblink-dj-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-barblink}:${POSTGRES_PASSWORD:-barblink_dev}@postgres:5432/barblink_dj
      JWT_SECRET: ${JWT_SECRET:-barblink_dev_jwt_secret}
      PORT: "3010"
    ports:
      - "${DJ_SERVICE_PORT:-3010}:3010"
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["services"]

  # ---------------------------------------------------------------------------
  # Events service — events, RSVP. Enable with --profile services
  # ---------------------------------------------------------------------------
  events-service:
    build:
      context: ./services/events-service
      dockerfile: Dockerfile
    container_name: barblink-events-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-barblink}:${POSTGRES_PASSWORD:-barblink_dev}@postgres:5432/barblink_events
      JWT_SECRET: ${JWT_SECRET:-barblink_dev_jwt_secret}
      PORT: "3011"
    ports:
      - "${EVENTS_SERVICE_PORT:-3011}:3011"
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["services"]

  # ---------------------------------------------------------------------------
  # Community service — streaks, badges, leaderboards. Enable with --profile services
  # ---------------------------------------------------------------------------
  community-service:
    build:
      context: ./services/community-service
      dockerfile: Dockerfile
    container_name: barblink-community-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-barblink}:${POSTGRES_PASSWORD:-barblink_dev}@postgres:5432/barblink_community
      JWT_SECRET: ${JWT_SECRET:-barblink_dev_jwt_secret}
      PORT: "3012"
    ports:
      - "${COMMUNITY_SERVICE_PORT:-3012}:3012"
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["services"]

  # ---------------------------------------------------------------------------
  # Scraper service — Playwright Instagram + Google. Enable with --profile services
  # ---------------------------------------------------------------------------
  scraper-service:
    build:
      context: ./services/scraper-service
      dockerfile: Dockerfile
    container_name: barblink-scraper-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-barblink}:${POSTGRES_PASSWORD:-barblink_dev}@postgres:5432/barblink_scraper
      JWT_SECRET: ${JWT_SECRET:-barblink_dev_jwt_secret}
      VENUE_SERVICE_URL: http://venue-service:3003/v1
      PLAYWRIGHT_HEADLESS: "true"
      PORT: "3009"
    ports:
      - "${SCRAPER_SERVICE_PORT:-3009}:3009"
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["services"]

  # ---------------------------------------------------------------------------
  # Vendor portal — Next.js web app. Enable with --profile portals
  # ---------------------------------------------------------------------------
  vendor-portal:
    build:
      context: ./apps/vendor-portal
      dockerfile: Dockerfile
    image: barblink/vendor-portal:latest
    container_name: barblink-vendor-portal
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${API_URL:-https://api.barblink.com/v1}
      PORT: "3020"
    ports:
      - "${VENDOR_PORTAL_PORT:-3020}:3020"
    profiles: ["portals"]

  # ---------------------------------------------------------------------------
  # DJ portal — Next.js web app. Enable with --profile portals
  # ---------------------------------------------------------------------------
  dj-portal:
    build:
      context: ./apps/dj-portal
      dockerfile: Dockerfile
    image: barblink/dj-portal:latest
    container_name: barblink-dj-portal
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${API_URL:-https://api.barblink.com/v1}
      PORT: "3021"
    ports:
      - "${DJ_PORTAL_PORT:-3021}:3021"
    profiles: ["portals"]

  # ---------------------------------------------------------------------------
  # Landing page (optional, production-style image). Enable with --profile landing
  # ---------------------------------------------------------------------------
  landing:
    build:
      context: ./apps/landing
      dockerfile: Dockerfile
      args:
        DOCKER_BUILD: "1"
    image: barblink/landing:latest
    container_name: barblink-landing
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3100"
      API_URL: ${API_URL:-}
    ports:
      - "${LANDING_PORT:-3100}:3100"
    profiles: ["landing"]

  # ---------------------------------------------------------------------------
  # Admin panel — Next.js web app. Enable with --profile admin
  # ---------------------------------------------------------------------------
  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile
    image: barblink/admin:latest
    container_name: barblink-admin
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_AUTH_API: http://host.docker.internal:3001/v1
      NEXT_PUBLIC_USER_API: http://host.docker.internal:3002/v1
      NEXT_PUBLIC_VENUE_API: http://host.docker.internal:3003/v1
      NEXT_PUBLIC_SOCIAL_API: http://host.docker.internal:3005/v1
      NEXT_PUBLIC_CHECKIN_API: http://host.docker.internal:3006/v1
    ports:
      - "${ADMIN_PORT:-3200}:3200"
    profiles: ["admin"]

  # ---------------------------------------------------------------------------
  # Monitoring — Grafana + Prometheus + Loki. Enable with --profile monitoring
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: barblink-prometheus
    restart: unless-stopped
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    profiles: ["monitoring"]

  grafana:
    image: grafana/grafana:11.4.0
    container_name: barblink-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-barblink_grafana}
      GF_SERVER_ROOT_URL: http://localhost:3300
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    ports:
      - "${GRAFANA_PORT:-3300}:3000"
    depends_on:
      - prometheus
    profiles: ["monitoring"]

  loki:
    image: grafana/loki:3.3.2
    container_name: barblink-loki
    restart: unless-stopped
    ports:
      - "3101:3100"
    volumes:
      - loki_data:/loki
    profiles: ["monitoring"]

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: barblink-cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "8080:8080"
    profiles: ["monitoring"]

volumes:
  postgres_data:
  redis_data:
  redpanda_data:
  minio_data:
  meilisearch_data:
  eas_home:
  eas_npm_cache:
  prometheus_data:
  grafana_data:
  loki_data:
